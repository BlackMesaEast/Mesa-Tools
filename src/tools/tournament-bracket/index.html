<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Bracket — Mesa Tools</title>
    <link rel="stylesheet" href="../../styles.css" />
    <style>
        /* This is the magic for mixing HTML and p5 */
    #bracket-canvas-container {
      position: relative;
      margin-top: 20px;
      border: 2px solid #080072;
      background: #000000;      
      min-height: 400px;         
      width: 800px;              
    }

    button
    {
      background-color: white;
      border: 3px solid #080072; 
      border-radius: 10px;
      padding: 1px 6px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
    }
    </style>
</head>
<body>
    <nav>
        <a class="logo" href="/">Mesa Tools</a>
    </nav>

    <main>
        <div class="tool-header">
            <a href="/">← Back to tools</a>
            <h1>Tournament Bracket</h1>
        </div>

        <div class="tool-body">
            <div id="controls">
                <button onclick="addTeam()">Add Team</button>
                <button onclick="resetBracket()">Reset</button>
                <button onclick="goy()">Bracket </button>
            </div>

            <div id="bracket-canvas-container"></div>
        </div>
    </main>

    <script src="../../libs/p5.min.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
