<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Format Converter – Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>
    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Image Format Converter</h1>
        <p>Change an image from one format to another.</p>
      </div>
      <div class="tool-body">
        <label class="upload-area" id="upload-area">
          <input
            type="file"
            hidden
            accept="image/png, image/jpeg, image/webp, image/gif, image/bmp, image/svg+xml"
            id="imagefile"
          />
          <img id="preview" src="" alt="" hidden style="max-height:120px;max-width:200px;border-radius:6px;" />
          <p id="upload-text">Click or drag a file here</p>
        </label>
        <span class="convert-label">Convert to</span>
        <select name="Formats" id="Formats">
          <option value="JPEG">JPEG</option>
          <option value="PNG">PNG</option>
          <option value="WebP">WebP</option>
          <option value="AVIF">AVIF</option>
        </select>
        <div class="convert-actions">
          <button class="btn-convert" onclick="convertImage()">
            Convert
          </button>
        </div>
      </div>
    </main>
    <script src="/tools/image-format-converter/script.js"></script>
  </body>
</html>
