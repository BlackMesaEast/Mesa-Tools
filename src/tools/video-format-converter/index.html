<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Format Converter – Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>
    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Video Format Converter</h1>
        <p>Change a video from one format to another.</p>
      </div>
      <div class="tool-body">
        <div class="tool-card">
          <h2 style="margin-bottom: 1.25rem">Video Converter</h2>
          <label class="upload-area" id="upload-area">
            <input
              type="file"
              hidden
              accept="video/mp4,video/webm,video/x-matroska,video/x-msvideo,video/quicktime,video/mpeg"
              id="videofile"
            />
            <p id="upload-text">Click or drag a video here</p>
            <p id="file-name" hidden></p>
          </label>
          <span class="convert-label">Convert to</span>
          <select name="Formats" id="Formats">
            <option value="mp4">MP4</option>
            <option value="webm">WebM</option>
            <option value="avi">AVI</option>
            <option value="mov">MOV</option>
            <option value="mkv">MKV</option>
            <option value="gif">GIF</option>
          </select>
          <div class="convert-actions">
            <button
              class="btn-convert"
              id="convertBtn"
              onclick="convertVideo()"
            >
              Convert
            </button>
          </div>
          <div class="progress-wrap" id="progress-wrap" hidden>
            <div class="progress-meta">
              <span id="progress-label"></span>
              <span id="progress-eta"></span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progress-bar"></div>
            </div>
          </div>
          <p id="status"></p>
        </div>
      </div>
    </main>
    <script src="/libs/ffmpeg/ffmpeg.js"></script>
    <script src="/tools/video-format-converter/script.js"></script>
  </body>
</html>
