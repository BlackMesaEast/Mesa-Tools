<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashlight — Mesa Tools</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="alternate icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css" />

  <style>                                                                                                                                                                
    .circle {                                                                                                                                                            
      width: 300px;                                                                                                                                                      
      height: 300px;                                                                                                                                                     
      border-radius: 50%;                                                                                                                                                
      background: black;                                                                                                                                                 
    }             
    .circle.on {                                                                                                                                                         
      background: white;
    }        
    
    .btn {                                                                                                                                                
      margin-top: 35px;                                                                                                                                                  
      padding: 10px 20px;                                                                                                                                               
      font-size: 16px;                                                                                                                                                   
      cursor: pointer;                                                                                                                                                    
    }

    .tool-body {                                                                                                                                                         
      display: flex;                                                                                                                                                    
      flex-direction: column;                                                                                                                                           
      align-items: center;                                                                                                                                               
    }
  </style> 
</head>
<body>
  <nav>
    <a class="logo" href="/">Mesa Tools</a>
  </nav>

  <main>
    <div class="tool-header">
      <a href="/">← Back to tools</a>
      <h1>Flashlight</h1>
      <p>Simple Flashlight Tool</p>
    </div>

    <div class="tool-body">
      <!-- Tool UI goes here -->
      <p style="color: var(--text-muted);">
        <div class="circle"></div>
        <button class="btn" onclick="toggle()">Toggle</button>        
      </p>
    </div>
  </main>
  
  <script>
    function toggle() {                                                                                                                                                  
      document.querySelector('.circle').classList.toggle('on');                                                                                                          
    }  
  </script>

</body>
</html>
