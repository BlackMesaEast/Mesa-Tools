<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="format-converter-colums">
      <div class="tool-card">
        <div class="converter-name">
          <h2>Image Converter</h2>
          <label class="upload-area">
            <input
              type="file"
              hidden
              accept="image/png, image/jpeg, image/webp, image/gif, image/bmp, image/svg+xml"
              id="imagefile"
            />
            <img
              id="preview"
              src=""
              alt=""
              hidden
              height="100px"
              width="auto"
            />
            <p id="upload-text">Click or drag a file here</p>
          </label>
          <div class="convert-text">
            <p>Convert To</p>
            <select name="Formats" id="Formats">
              <option value="JPEG">JPEG</option>
              <option value="PNG">PNG</option>
              <option value="WebP">WebP</option>
              <option value="AVIF">AVIF</option>
            </select>
          </div>
          <button class="button" onclick="convertImage()">Convert</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
