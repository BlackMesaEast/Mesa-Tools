<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Video Resizer — Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>

    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Discord Video Resizer</h1>
        <p>Resize videos to fit under Discord's 10MB file limit.</p>
      </div>

      <div class="tool-body">
        <label class="upload-area" id="upload-area" style="opacity:0.4;pointer-events:none;">
          <input type="file" id="videofile" accept="video/*" hidden />
          <p id="upload-text">Click or drag a video here</p>
        </label>
        <div class="progress-wrap" id="progress-wrap" hidden>
          <div class="progress-meta">
            <span id="progress-label"></span>
            <span id="progress-eta"></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="/libs/ffmpeg/ffmpeg.js"></script>
    <script type="module">
      const { FFmpeg } = FFmpegWASM;
      const ffmpeg = new FFmpeg();

      const fileInput = document.getElementById('videofile');
      const uploadArea = document.getElementById('upload-area');
      const uploadText = document.getElementById('upload-text');
      const progressWrap = document.getElementById('progress-wrap');
      const progressBar = document.getElementById('progress-bar');
      const progressLabel = document.getElementById('progress-label');
      const progressEta = document.getElementById('progress-eta');

      let encodeStart = 0;

      ffmpeg.on('log', ({ message }) => console.log(message));
      ffmpeg.on('progress', ({ progress }) => {
        const pct = Math.min(1, Math.max(0, progress));
        progressBar.style.width = `${Math.round(pct * 100)}%`;
        progressLabel.textContent = `Encoding… ${Math.round(pct * 100)}%`;
        if (pct > 0.01) {
          const elapsed = (Date.now() - encodeStart) / 1000;
          const eta = Math.round(elapsed / pct - elapsed);
          progressEta.textContent = eta > 0 ? `${eta}s remaining` : '';
        }
      });

      await ffmpeg.load({
        coreURL: '/libs/ffmpeg/ffmpeg-core.js',
        wasmURL: '/libs/ffmpeg/ffmpeg-core.wasm',
      });
      uploadArea.style.opacity = '';
      uploadArea.style.pointerEvents = '';

      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
      });
      uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) handleFile(file);
      });

      const RESOLUTIONS = [1920, 1280, 854, 640];
      const FRAMERATES = [30, 24, 15];
      const MIN_VIDEO_BITRATE = 80000;
      const TARGET_BITS = 9 * 1024 * 1024 * 8;

      function pickAudioBitrate(budgetBitsPerSec) {
        if (budgetBitsPerSec > 500000) return { bitrate: 96000, mono: false };
        if (budgetBitsPerSec > 200000) return { bitrate: 64000, mono: false };
        if (budgetBitsPerSec > 100000) return { bitrate: 48000, mono: true };
        return { bitrate: 32000, mono: true };
      }

      function pickSettings(duration, srcWidth) {
        const budgetBitsPerSec = TARGET_BITS / duration;

        for (const fps of FRAMERATES) {
          for (const maxW of RESOLUTIONS.filter(w => w <= srcWidth)) {
            const { bitrate: audioBitrate, mono } = pickAudioBitrate(budgetBitsPerSec);
            const videoBitrate = Math.floor(budgetBitsPerSec) - audioBitrate;

            if (videoBitrate >= MIN_VIDEO_BITRATE) {
              return { videoBitrate, audioBitrate, maxW, fps, mono };
            }
          }
        }

        // absolute last resort
        return {
          videoBitrate: MIN_VIDEO_BITRATE,
          audioBitrate: 32000,
          maxW: 640,
          fps: 15,
          mono: true,
        };
      }

      function getVideoInfo(file) {
        return new Promise((resolve) => {
          const video = document.createElement('video');
          const url = URL.createObjectURL(file);
          video.src = url;
          video.onloadedmetadata = () => {
            URL.revokeObjectURL(url);
            resolve({
              duration: video.duration,
              width: video.videoWidth,
              height: video.videoHeight,
            });
          };
        });
      }

      async function handleFile(file) {
        uploadText.textContent = file.name;

        const ext = file.name.split('.').pop() || 'mp4';
        const inputName = `input.${ext}`;

        const { duration, width } = await getVideoInfo(file);
        const { videoBitrate, audioBitrate, maxW, fps, mono } = pickSettings(duration, width);

        progressWrap.hidden = false;
        progressBar.style.width = '0%';
        progressLabel.textContent = `${Math.round(duration)}s — ${Math.round(videoBitrate / 1000)}k video / ${Math.round(audioBitrate / 1000)}k audio${mono ? ' mono' : ''} @ ${maxW}p${fps}`;
        progressEta.textContent = '';
        encodeStart = Date.now();

        const input = new Uint8Array(await file.arrayBuffer());
        await ffmpeg.writeFile(inputName, input);

        const args = [
          '-i', inputName,
          '-c:v', 'libx264',
          '-preset', 'ultrafast',
          '-b:v', `${videoBitrate}`,
          '-maxrate', `${videoBitrate}`,
          '-bufsize', `${videoBitrate * 2}`,
          '-vf', `scale='min(${maxW},iw)':-2`,
          '-r', `${fps}`,
          '-c:a', 'aac',
          '-b:a', `${audioBitrate}`,
        ];

        if (mono) args.push('-ac', '1');

        args.push('output.mp4');

        const code = await ffmpeg.exec(args);
        await ffmpeg.deleteFile(inputName);

        if (code !== 0) {
          progressLabel.textContent = 'Error — check the browser console for details.';
          progressEta.textContent = '';
          return;
        }

        const output = await ffmpeg.readFile('output.mp4');
        await ffmpeg.deleteFile('output.mp4');

        if (!output || output.byteLength === 0) {
          progressLabel.textContent = 'Error — output was empty.';
          progressEta.textContent = '';
          return;
        }

        const url = URL.createObjectURL(new Blob([output.buffer], { type: 'video/mp4' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name.replace(/\.[^.]+$/, '') + '_discord.mp4';
        a.click();
        URL.revokeObjectURL(url);

        progressBar.style.width = '100%';
        progressLabel.textContent = 'Done!';
        progressEta.textContent = '';
      }
    </script>
  </body>
</html>
