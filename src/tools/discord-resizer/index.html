<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Video Resizer — Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>

    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Discord Video Resizer</h1>
        <p>Resize videos to fit under Discord's 10MB file limit.</p>
      </div>

      <div class="tool-body">
        <label class="upload-area" id="upload-area" style="opacity:0.4;pointer-events:none;">
          <input type="file" id="videofile" accept="video/*" hidden />
          <p id="upload-text">Click or drag a video here</p>
        </label>
        <div class="progress-wrap" id="progress-wrap" hidden>
          <div class="progress-meta">
            <span id="progress-label"></span>
            <span id="progress-eta"></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
          </div>
        </div>
      </div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "mediabunny": "https://cdn.jsdelivr.net/npm/mediabunny@1.40.1/dist/bundles/mediabunny.mjs"
        }
      }
    </script>
    <script src="/libs/ffmpeg/ffmpeg.js"></script>
    <script type="module">
      import {
        Input, Output, BlobSource, ALL_FORMATS, Mp4OutputFormat, BufferTarget,
        Conversion, getFirstEncodableVideoCodec,
      } from 'mediabunny';

      const { FFmpeg } = FFmpegWASM;
      const ffmpeg = new FFmpeg();

      const fileInput = document.getElementById('videofile');
      const uploadArea = document.getElementById('upload-area');
      const uploadText = document.getElementById('upload-text');
      const progressWrap = document.getElementById('progress-wrap');
      const progressBar = document.getElementById('progress-bar');
      const progressLabel = document.getElementById('progress-label');
      const progressEta = document.getElementById('progress-eta');

      let encodeStart = 0;

      // --- FFmpeg WASM (fallback encoder) ---
      ffmpeg.on('log', ({ message }) => console.log(message));
      ffmpeg.on('progress', ({ progress }) => {
        const pct = Math.min(1, Math.max(0, progress));
        progressBar.style.width = `${Math.round(pct * 100)}%`;
        if (pct > 0.01) {
          const elapsed = (Date.now() - encodeStart) / 1000;
          const eta = Math.round(elapsed / pct - elapsed);
          progressEta.textContent = eta > 0 ? `${eta}s remaining` : '';
        }
      });

      // Wait for FFmpeg WASM before enabling the UI.
      await ffmpeg.load({ coreURL: '/libs/ffmpeg/ffmpeg-core.js', wasmURL: '/libs/ffmpeg/ffmpeg-core.wasm' });
      uploadArea.style.opacity = '';
      uploadArea.style.pointerEvents = '';

      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
      });
      uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) handleFile(file);
      });

      const RESOLUTIONS = [1920, 1280, 854, 640, 426];
      const MIN_VIDEO_BITRATE = 40000;
      const TARGET_BITS = 8 * 1024 * 1024 * 8; // 8MB target — leaves 2MB margin below Discord's 10MB limit

      function pickAudioBitrate(budgetBitsPerSec) {
        if (budgetBitsPerSec > 500000) return { bitrate: 96000, mono: false };
        if (budgetBitsPerSec > 200000) return { bitrate: 64000, mono: false };
        if (budgetBitsPerSec > 100000) return { bitrate: 48000, mono: true };
        return { bitrate: 32000, mono: true };
      }

      function pickSettings(duration, srcWidth) {
        const budgetBitsPerSec = TARGET_BITS / duration;
        const { bitrate: audioBitrate, mono } = pickAudioBitrate(budgetBitsPerSec);
        const videoBitrate = Math.max(MIN_VIDEO_BITRATE, Math.floor(budgetBitsPerSec) - audioBitrate);

        // Drop fps at low video bitrates — fewer frames means more bits per frame
        const fps = videoBitrate > 300000 ? 30 : videoBitrate > 100000 ? 24 : 15;

        // Pick the largest resolution where quality is acceptable.
        // Heuristic: at least 0.15 bits per pixel per second for HEVC (assumes 16:9).
        for (const maxW of RESOLUTIONS.filter(w => w <= srcWidth)) {
          const pixelCount = maxW * Math.round(maxW * 9 / 16);
          if (videoBitrate / pixelCount >= 0.15) {
            return { videoBitrate, audioBitrate, maxW, fps, mono };
          }
        }

        // Absolute last resort: smallest available resolution
        const minW = Math.min(srcWidth, RESOLUTIONS[RESOLUTIONS.length - 1]);
        return { videoBitrate, audioBitrate, maxW: minW, fps, mono };
      }

      function getVideoInfo(file) {
        return new Promise((resolve) => {
          const video = document.createElement('video');
          const url = URL.createObjectURL(file);
          video.src = url;
          video.onloadedmetadata = () => {
            URL.revokeObjectURL(url);
            resolve({
              duration: video.duration,
              width: video.videoWidth,
              height: video.videoHeight,
            });
          };
        });
      }

      async function encodeVideoWithMediabunny(file, { videoBitrate, maxW, fps }) {
        const videoCodec = await getFirstEncodableVideoCodec(['hevc', 'avc']);
        if (!videoCodec) throw new Error('mediabunny: no encodable video codec available');

        const input = new Input({ source: new BlobSource(file), formats: ALL_FORMATS });
        const output = new Output({ format: new Mp4OutputFormat(), target: new BufferTarget() });

        const conversion = await Conversion.init({
          input,
          output,
          video: (track) => ({
            codec: videoCodec,
            width: Math.min(maxW, track.displayWidth),
            fit: 'contain',
            bitrate: videoBitrate,
            frameRate: fps,
            forceTranscode: true,
            hardwareAcceleration: 'prefer-hardware',
          }),
          audio: { discard: true },
        });

        if (!conversion.isValid) {
          throw new Error('mediabunny: conversion is not valid');
        }

        conversion.onProgress = (pct) => {
          progressBar.style.width = `${Math.round(pct * 100)}%`;
          progressLabel.textContent = `Encoding video… ${Math.round(pct * 100)}%`;
          if (pct > 0.01) {
            const elapsed = (Date.now() - encodeStart) / 1000;
            const eta = Math.round(elapsed / pct - elapsed);
            progressEta.textContent = eta > 0 ? `${eta}s remaining` : '';
          }
        };

        await conversion.execute();

        const { buffer } = output.target;
        if (!buffer || buffer.byteLength === 0) throw new Error('mediabunny: output was empty');

        return buffer;
      }

      async function muxWithFFmpeg(videoBuffer, originalFile, { audioBitrate, mono }) {
        const ext = originalFile.name.split('.').pop() || 'mp4';
        const inputName = `input.${ext}`;

        progressLabel.textContent = 'Encoding audio…';
        progressBar.style.width = '0%';
        progressEta.textContent = '';
        encodeStart = Date.now();

        await ffmpeg.writeFile('video.mp4', new Uint8Array(videoBuffer));
        await ffmpeg.writeFile(inputName, new Uint8Array(await originalFile.arrayBuffer()));

        const args = [
          '-i', 'video.mp4',
          '-i', inputName,
          '-map', '0:v:0',
          '-map', '1:a:0',
          '-c:v', 'copy',
          '-c:a', 'aac',
          '-b:a', `${audioBitrate}`,
        ];

        if (mono) args.push('-ac', '1');

        args.push('output.mp4');

        const code = await ffmpeg.exec(args);
        await ffmpeg.deleteFile('video.mp4');
        await ffmpeg.deleteFile(inputName);

        if (code !== 0) throw new Error('FFmpeg mux exited with code ' + code);

        const output = await ffmpeg.readFile('output.mp4');
        await ffmpeg.deleteFile('output.mp4');

        if (!output || output.byteLength === 0) throw new Error('FFmpeg mux output was empty');

        return output.buffer;
      }

      async function encodeWithFFmpeg(file, { videoBitrate, audioBitrate, maxW, fps, mono }) {
        const ext = file.name.split('.').pop() || 'mp4';
        const inputName = `input.${ext}`;

        progressLabel.textContent = 'Encoding…';

        const input = new Uint8Array(await file.arrayBuffer());
        await ffmpeg.writeFile(inputName, input);

        const args = [
          '-i', inputName,
          '-c:v', 'libx264',
          '-preset', 'ultrafast',
          '-b:v', `${videoBitrate}`,
          '-maxrate', `${videoBitrate}`,
          '-bufsize', `${videoBitrate * 2}`,
          '-vf', `scale='min(${maxW},iw)':-2`,
          '-r', `${fps}`,
          '-c:a', 'aac',
          '-b:a', `${audioBitrate}`,
        ];

        if (mono) args.push('-ac', '1');

        args.push('output.mp4');

        const code = await ffmpeg.exec(args);
        await ffmpeg.deleteFile(inputName);

        if (code !== 0) throw new Error('FFmpeg exited with code ' + code);

        const output = await ffmpeg.readFile('output.mp4');
        await ffmpeg.deleteFile('output.mp4');

        if (!output || output.byteLength === 0) throw new Error('FFmpeg output was empty');

        return output.buffer;
      }

      async function handleFile(file) {
        uploadText.textContent = file.name;

        const { duration, width } = await getVideoInfo(file);
        const settings = pickSettings(duration, width);
        const { videoBitrate, audioBitrate, maxW, fps, mono } = settings;

        progressWrap.hidden = false;
        progressBar.style.width = '0%';
        progressLabel.textContent = `${Math.round(duration)}s — ${Math.round(videoBitrate / 1000)}k video / ${Math.round(audioBitrate / 1000)}k audio${mono ? ' mono' : ''} @ ${maxW}p${fps}`;
        progressEta.textContent = '';
        encodeStart = Date.now();

        let outputBuffer = null;

        // Try hybrid path: mediabunny for video, FFmpeg for audio mux
        if (typeof VideoEncoder !== 'undefined') {
          try {
            const videoBuffer = await encodeVideoWithMediabunny(file, settings);
            // If mediabunny ignored the bitrate target and overshot, fall back to FFmpeg
            // which enforces strict -maxrate. Allow 10% headroom above target.
            const maxVideoBytes = TARGET_BITS / 8 * 1.1;
            if (videoBuffer.byteLength > maxVideoBytes) {
              throw new Error(`mediabunny video too large (${(videoBuffer.byteLength / 1e6).toFixed(1)}MB), falling back to FFmpeg`);
            }
            outputBuffer = await muxWithFFmpeg(videoBuffer, file, settings);
          } catch (err) {
            console.warn('Hybrid encode failed, falling back to full FFmpeg:', err);
            progressLabel.textContent = 'Falling back to FFmpeg…';
            progressBar.style.width = '0%';
            progressEta.textContent = '';
            encodeStart = Date.now();
          }
        }

        // FFmpeg fallback
        if (outputBuffer === null) {
          try {
            outputBuffer = await encodeWithFFmpeg(file, settings);
          } catch (err) {
            progressLabel.textContent = 'Error — check the browser console for details.';
            progressEta.textContent = '';
            console.error(err);
            return;
          }
        }

        const url = URL.createObjectURL(new Blob([outputBuffer], { type: 'video/mp4' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name.replace(/\.[^.]+$/, '') + '_discord.mp4';
        a.click();
        URL.revokeObjectURL(url);

        progressBar.style.width = '100%';
        progressLabel.textContent = 'Done!';
        progressEta.textContent = '';
      }
    </script>
  </body>
</html>
