<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Picker — Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/mesa-tools-logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .sv-cursor {
        position: absolute;
        transform: translate(-50%, -100%); /* tip of arrow = selected point */
        pointer-events: none;
        filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.6));
      }
      .sv-wrap {
        position: relative;
      }
      .hue-wrap {
        position: relative;
      }
      .hue-cursor {
        position: absolute;
        top: 0;
        width: 4px;
        height: 100%;
        background: white;
        border-radius: 2px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>
    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Color Picker</h1>
        <p>Simple Color Picker Tool</p>
      </div>

      <div class="tool-body">
        <!-- Tool UI goes here -->

        <div class="picker-wrap">
          <div class="sv-wrap">
            <canvas
              id="svCanvas"
              width="300px"
              height="250px"
              style="width: 100%; height: 250px"
            ></canvas>
            <div id="svCursor" class="sv-cursor">
              <svg
                width="32"
                height="52"
                viewBox="0 0 32 52"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="16"
                  cy="15"
                  r="13"
                  id="svCursorFill"
                  fill="red"
                  stroke="white"
                  stroke-width="2"
                />
                <rect x="14" y="28" width="4" height="13" fill="white" />
                <polygon points="6,41 26,41 16,52" fill="white" />
              </svg>
            </div>
          </div>
          <div class="hue-wrap" style="margin-top: 10px">
            <canvas id="hueCanvas" height="10px" style="width: 100%"></canvas>
            <div id="hueCursor" class="hue-cursor"></div>
          </div>
        </div>
        <div
          style="
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              width: 40%;
              justify-content: space-between;
            "
          >
            <p
              style="
                display: flex;
                color: var(--text-muted);
                border: 1px solid var(--text-muted);
                padding: 0.25rem;
                border-radius: 8px;
                align-items: center;
              "
            >
              HEX:
              <span id="hexValue">#ff0000</span>
              <button
                class="btn-copy"
                style="cursor: pointer; margin-left: auto"
                onclick="copyToClipboard(this)"
              >
                Copy
              </button>
            </p>
            <p
              style="
                display: flex;
                color: var(--text-muted);
                border: 1px solid var(--text-muted);
                padding: 0.25rem;
                border-radius: 8px;
                margin-top: 1rem;
                align-items: center;
              "
            >
              RGB:
              <span id="rgbValue">255, 0, 0</span>
              <button
                class="btn-copy"
                style="cursor: pointer; margin-left: auto"
                onclick="copyToClipboard(this)"
              >
                Copy
              </button>
            </p>
            <p
              style="
                display: flex;
                color: var(--text-muted);
                border: 1px solid var(--text-muted);
                padding: 0.25rem;
                border-radius: 8px;
                margin-top: 1rem;
                align-items: center;
              "
            >
              HSL:
              <span id="hslValue">0, 100%, 50%</span>
              <button
                class="btn-copy"
                style="cursor: pointer; margin-left: auto"
                onclick="copyToClipboard(this)"
              >
                Copy
              </button>
            </p>
            <p
              style="
                display: flex;
                color: var(--text-muted);
                border: 1px solid var(--text-muted);
                padding: 0.25rem;
                border-radius: 8px;
                margin-top: 1rem;
                align-items: center;
              "
            >
              HSV:
              <span id="hsvValue">0, 100%, 100%</span>
              <button
                class="btn-copy"
                style="cursor: pointer; margin-left: auto"
                onclick="copyToClipboard(this)"
              >
                Copy
              </button>
            </p>
            <p
              style="
                display: flex;
                color: var(--text-muted);
                border: 1px solid var(--text-muted);
                padding: 0.25rem;
                border-radius: 8px;
                margin-top: 1rem;
                align-items: center;
              "
            >
              CMYK:
              <span id="cmykValue">0%, 100%, 100%, 0%</span>
              <button
                class="btn-copy"
                style="cursor: pointer; margin-left: auto"
                onclick="copyToClipboard(this)"
              >
                Copy
              </button>
            </p>
          </div>
          <label
            class="upload-area"
            style="
              width: 60%;
              height: 300px;
              overflow: hidden;
              align-self: stretch;
              padding: 0px;
            "
          >
            <input type="file" hidden accept="image/*" id="imageUpload" />
            <img
              id="preview"
              src=""
              alt=""
              hidden
              style="height: 100%; width: 100%; cursor: crosshair"
            />
            <p id="upload-text">Click or drag a file here</p>
          </label>
        </div>
      </div>
    </main>
    <script src="/tools/color-picker/script.js"></script>
  </body>
</html>
