<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Video Sizer — Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/mesa-tools-logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>

    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Discord Video Sizer</h1>
        <p>Resize videos to fit under Discord's 10MB file limit.</p>
      </div>

      <div class="tool-body">
        <input type="file" id="videofile" accept="video/*" />
        <p id="status" style="color: var(--text-muted); margin-top: 1rem"></p>
        <button
          id="btn"
          onclick="convert()"
          style="
            margin-top: 1rem;
            padding: 0.6rem 1.5rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
          "
          disabled
        >
          Convert
        </button>
      </div>
    </main>

    <script src="/libs/ffmpeg/ffmpeg.js"></script>
    <script type="module">
      const { FFmpeg } = FFmpegWASM;
      const ffmpeg = new FFmpeg();

      const status = document.getElementById('status');
      const btn = document.getElementById('btn');

      ffmpeg.on('log', ({ message }) => console.log(message));
      ffmpeg.on('progress', ({ progress }) => {
        const pct = Math.min(100, Math.max(0, Math.round(progress * 100)));
        status.textContent = `Encoding… ${pct}%`;
      });

      status.textContent = 'Loading ffmpeg…';
      await ffmpeg.load({
        coreURL: '/libs/ffmpeg/ffmpeg-core.js',
        wasmURL: '/libs/ffmpeg/ffmpeg-core.wasm',
        workerURL: '/libs/ffmpeg/ffmpeg-core.worker.js',
      });
      status.textContent = 'Ready.';
      btn.disabled = false;

      window.convert = async () => {
        const file = document.getElementById('videofile').files[0];
        if (!file) return;

        // calculate bitrate to hit ~9MB (leaving headroom)
        const duration = await getVideoDuration(file);
        const targetBits = 9 * 1024 * 1024 * 8;
        const videoBitrate = Math.floor(targetBits / duration - 128000); // subtract 128k audio

        status.textContent = `Duration: ${Math.round(duration)}s — targeting ${Math.round(videoBitrate / 1000)}k video bitrate`;

        const input = new Uint8Array(await file.arrayBuffer());
        await ffmpeg.writeFile('input.mp4', input);

        await ffmpeg.exec([
          '-i',
          'input.mp4',
          '-preset',
          'ultrafast',
          '-b:v',
          `${videoBitrate}`,
          '-b:a',
          '128k',
          'output.mp4',
        ]);

        const output = await ffmpeg.readFile('output.mp4');
        const url = URL.createObjectURL(
          new Blob([output.buffer], { type: 'video/mp4' }),
        );
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name.replace(/\.[^.]+$/, '') + '_discord.mp4';
        a.click();
        URL.revokeObjectURL(url);
        status.textContent = 'Done!';
      };

      function getVideoDuration(file) {
        return new Promise((resolve) => {
          const video = document.createElement('video');
          video.src = URL.createObjectURL(file);
          video.onloadedmetadata = () => resolve(video.duration);
        });
      }
    </script>
  </body>
</html>
