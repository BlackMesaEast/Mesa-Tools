<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Video Sizer — Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/mesa-tools-logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>

    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Discord Video Sizer</h1>
        <p>Resize videos to fit under Discord's 10MB file limit.</p>
      </div>

      <div class="tool-body">
        <label class="upload-area" id="upload-area">
          <input type="file" id="videofile" accept="video/*" hidden />
          <p id="upload-text">Click or drag a video here</p>
        </label>
        <p id="status" style="color: var(--text-muted)"></p>
      </div>
    </main>

    <script src="/libs/ffmpeg/ffmpeg.js"></script>
    <script type="module">
      const { FFmpeg } = FFmpegWASM;
      const ffmpeg = new FFmpeg();

      const status = document.getElementById('status');
      const fileInput = document.getElementById('videofile');
      const uploadArea = document.getElementById('upload-area');
      const uploadText = document.getElementById('upload-text');

      ffmpeg.on('log', ({ message }) => console.log(message));
      ffmpeg.on('progress', ({ progress }) => {
        const pct = Math.min(100, Math.max(0, Math.round(progress * 100)));
        status.textContent = `Encoding… ${pct}%`;
      });

      status.textContent = 'Loading ffmpeg…';
      await ffmpeg.load({
        coreURL: '/libs/ffmpeg/ffmpeg-core.js',
        wasmURL: '/libs/ffmpeg/ffmpeg-core.wasm',
        workerURL: '/libs/ffmpeg/ffmpeg-core.worker.js',
      });
      status.textContent = 'Ready.';

      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
      });
      uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) handleFile(file);
      });

      async function handleFile(file) {
        uploadText.textContent = file.name;

        const ext = file.name.split('.').pop() || 'mp4';
        const inputName = `input.${ext}`;

        const duration = await getVideoDuration(file);
        const targetBits = 9 * 1024 * 1024 * 8;
        const videoBitrate = Math.floor(targetBits / duration - 128000);

        status.textContent = `Duration: ${Math.round(duration)}s — targeting ${Math.round(videoBitrate / 1000)}k video bitrate`;

        const input = new Uint8Array(await file.arrayBuffer());
        await ffmpeg.writeFile(inputName, input);

        const code = await ffmpeg.exec([
          '-i', inputName,
          '-c:v', 'libx264',
          '-preset', 'ultrafast',
          '-b:v', `${videoBitrate}`,
          '-c:a', 'aac',
          '-b:a', '128k',
          'output.mp4',
        ]);

        if (code !== 0) {
          status.textContent = 'Error — check the browser console for details.';
          return;
        }

        const output = await ffmpeg.readFile('output.mp4');
        if (!output || output.byteLength === 0) {
          status.textContent = 'Error — output was empty.';
          return;
        }

        const url = URL.createObjectURL(new Blob([output.buffer], { type: 'video/mp4' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name.replace(/\.[^.]+$/, '') + '_discord.mp4';
        a.click();
        URL.revokeObjectURL(url);
        status.textContent = 'Done!';
      }

      function getVideoDuration(file) {
        return new Promise((resolve) => {
          const video = document.createElement('video');
          video.src = URL.createObjectURL(file);
          video.onloadedmetadata = () => resolve(video.duration);
        });
      }
    </script>
  </body>
</html>
