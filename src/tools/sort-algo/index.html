<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting Algorithm Visualizer — Mesa Tools</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .tool-body {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 0;
        overflow: hidden;
      }

      #canvas-container {
        width: 100%;
        height: 500px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.875rem 1rem;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
      }

      .controls button {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        cursor: pointer;
        font-size: 0.875rem;
        padding: 0.4rem 0.875rem;
        transition:
          border-color 0.15s,
          color 0.15s;
      }

      .controls button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .controls button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .controls button.primary:hover {
        opacity: 0.85;
        color: #fff;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      .control-group span {
        color: var(--text);
        min-width: 1.5rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .control-group input[type='range'] {
        accent-color: var(--accent);
        cursor: pointer;
        width: 70px;
      }

      .divider {
        width: 1px;
        height: 1.25rem;
        background: var(--border);
        flex-shrink: 0;
      }

      .controls .push {
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Mesa Tools</a>
    </nav>

    <main>
      <div class="tool-header">
        <a href="/">← Back to tools</a>
        <h1>Sorting Algorithm Visualizer</h1>
        <p>Visualize how different sorting algorithms work.</p>
      </div>

      <div class="tool-body">
        <div id="canvas-container"></div>
        <div class="controls">
          <button onclick="shuffleValues()">Shuffle</button>
          <div class="divider"></div>
          <select id="algorithm">
            <option value="bubble">Bubble Sort</option>
            <option value="quick">Quick Sort</option>
            <option value="merge">Merge Sort</option>
          </select>
          <div class="divider"></div>
          <div class="control-group">
            <span>Bars</span>
            <input type="range" id="value-count" min="2" max="100" value="30" />
            <span id="value-count-val">30</span>
          </div>
          <div class="divider"></div>
          <div class="control-group">
            <span>Speed</span>
            <input type="range" id="speed" min="10" max="1000" value="500" />
            <span id="speed-val">500</span>
            ms
          </div>
          <select id="anim-mode">
            <option value="scale">Scale</option>
            <option value="move">Move</option>
          </select>
          <button class="primary push" onclick="startSort()">Sort</button>
        </div>
      </div>
    </main>

    <script src="/libs/p5.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
