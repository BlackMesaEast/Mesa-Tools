<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesa Tools</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <a class="logo" href="/">Mesa Tools</a>
  </nav>

  <main>
    <div class="hero">
      <h1>Mesa Tools</h1>
      <p>A collection of useful tools.</p>
    </div>

    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search tools…" autofocus />
    </div>

    <div class="tool-grid">
      <!-- Add a tool card for each tool. Copy the block below. -->
      <a class="tool-card" href="/tools/example-tool">
        <h2>Example Tool</h2>
        <p>A short description of what this tool does.</p>
      </a>
    </div>

    <p class="no-results">No tools match your search.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
